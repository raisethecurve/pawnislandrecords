<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" sizes="16x16" href="assets/brand/pawnisland-016.jpg" />
    <link rel="icon" type="image/jpeg" sizes="48x48" href="assets/brand/pawnisland-048.jpg" />
    <link rel="icon" type="image/jpeg" sizes="96x96" href="assets/brand/pawnisland-096.jpg" />
    <link rel="icon" type="image/jpeg" sizes="256x256" href="assets/brand/pawnisland-256.jpg" />
    <link rel="apple-touch-icon" sizes="512x512" href="assets/brand/pawnisland-512.jpg" />
    <title>Press Kit | Pawn Island Records</title>
    <meta
      name="description"
      content="Press kit for a Pawn Island Records project with positioning, bio, media, and release context."
    />
    <script src="site-shell-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=League+Spartan:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="label-site.css" />
    <link rel="stylesheet" href="site-audio.css" />
  </head>
  <body data-page="epk">
    <a class="skip-link" href="#label-main">Skip to content</a>
    <div class="label-page">
      <header class="label-header">
        <a class="brand-mark" href="index.html" aria-label="Pawn Island Records home">
          <img
            src="assets/brand/pawnisland-256.jpg"
            alt="Pawn Island Records logo"
            width="60"
            height="60"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
          <span class="brand-mark__copy">
            <strong>Pawn Island Records</strong>
            <span>Project Press</span>
          </span>
        </a>

        <nav class="label-nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="roster.html">Roster</a>
          <a href="about.html">About</a>
        </nav>
      </header>

      <main class="label-main" id="label-main">
        <section class="panel-shell epk-page-shell" id="epk-page-panel" aria-labelledby="epk-page-title">
          <div class="epk-page-hero">
            <article class="epk-page-copy">
              <p class="section-kicker">Press Kit</p>
              <h1 id="epk-page-title">Loading press kit...</h1>
              <p class="epk-page-copy__lane" id="epk-page-lane"></p>
              <p class="epk-page-copy__summary" id="epk-page-summary"></p>
              <p class="epk-page-copy__body" id="epk-page-body"></p>
              <div class="action-row" id="epk-page-actions"></div>
            </article>

            <aside class="epk-page-aside">
              <div class="epk-page-visual" id="epk-page-visual"></div>
              <div class="epk-stat-grid" id="epk-page-stats" aria-label="Press kit stats"></div>
            </aside>
          </div>

          <section class="epk-stage-shell" aria-labelledby="epk-stage-title">
            <div class="rail-header">
              <div>
                <p class="section-kicker">Press Materials</p>
                <h2 id="epk-stage-title">Kit Views</h2>
              </div>
              <p class="rail-copy" id="epk-stage-copy">
                Switch between overview, bio, catalog, media, and assets.
              </p>
            </div>
            <div class="artist-media-panel">
              <div class="artist-media-panel__views" id="epk-page-views"></div>
              <div class="artist-media-panel__stage" id="epk-page-stage"></div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="public-data.js"></script>
    <script src="site-ui.js"></script>
    <script src="label-site.js"></script>
    <script src="site-audio-config.js"></script>
    <script src="site-audio.js"></script>
  </body>
</html>
