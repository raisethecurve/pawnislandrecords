  <body data-page="merch">
    <a class="skip-link" href="#label-main">Skip to content</a>
    <div class="label-page">
      <main class="label-main" id="label-main">
        <section class="panel-shell merch-panel" aria-labelledby="merch-title">
          <div class="merch-hero">
            <article class="merch-copy">
              <p class="section-kicker">Merch Store</p>
              <h1 id="merch-title">T-Shirts</h1>
              <p id="merch-intro">
                Pawn Island Records merch currently starts with T-shirts. Live inventory loads through the secure Printful API layer.
              </p>
              <div class="action-row">
                <a class="button button--primary" id="merch-support-link" href="https://tiptopjar.com/pawnisland" target="_blank" rel="noreferrer">
                  Support the Label
                </a>
                <a class="button button--ghost" href="connect.html">Open Connect</a>
              </div>
            </article>

            <aside class="merch-status-card" aria-labelledby="merch-status-title">
              <p class="section-kicker">Store State</p>
              <h2 id="merch-status-title">Store MVP</h2>
              <div class="merch-stats" id="merch-stats"></div>
            </aside>
          </div>

          <section class="merch-store-mvp" aria-labelledby="merch-store-title">
            <div class="panel-header">
              <div>
                <p class="section-kicker">Printful Store</p>
                <h2 id="merch-store-title">T-shirts</h2>
              </div>
              <div class="panel-note">
                <p id="printful-store-status">Checking Printful inventory.</p>
              </div>
            </div>
            <div class="merch-store-layout">
              <div class="merch-grid merch-grid--live" id="printful-store-grid"></div>
              <aside class="merch-cart" id="printful-cart" aria-labelledby="printful-cart-title" aria-live="polite">
                <h3 id="printful-cart-title">Cart</h3>
                <div id="printful-cart-body"></div>
              </aside>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="public-data.js"></script>
    <script src="site-ui.js"></script>
    <script src="label-site.js"></script>
    <script src="site-audio-config.js"></script>
    <script src="site-audio.js"></script>
