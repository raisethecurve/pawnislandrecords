<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pawn Island Records</title>
    <meta
      name="description"
      content="Pawn Island Records presented as a single immersive release stage with cinematic transitions and a refined coverflow reel."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="landing.css" />
  </head>
  <body>
    <div class="experience" id="top">
      <div class="experience__backdrop" aria-hidden="true">
        <div class="experience__image experience__image--active" id="bg-active"></div>
        <div class="experience__image" id="bg-buffer"></div>
        <div class="experience__wash"></div>
        <div class="experience__grid"></div>
        <div class="experience__noise"></div>
        <div class="experience__vignette"></div>
        <div class="experience__beam"></div>
      </div>

      <main class="stage">
        <header class="masthead">
          <a class="brand-lockup" href="#top" aria-label="Pawn Island Records">
            <img
              src="assets/brand/pawn-island-logo-1200.jpg"
              alt="Pawn Island Records logo"
            />
            <span class="brand-lockup__copy">
              <strong>Pawn Island Records</strong>
              <span>Immersive release stage</span>
            </span>
          </a>

          <div class="masthead__meta">
            <span class="masthead__line"></span>
            <span id="release-index"></span>
          </div>
        </header>

        <section class="hero" aria-label="Pawn Island Records release experience">
          <div class="hero__copy">
            <p class="eyebrow">Pawn Island Records</p>
            <h1>Release worlds in motion.</h1>
            <p class="hero__lede">
              A single-screen visual identity built around the mark, the
              atmosphere of the releases, and a cinematic reel of projects in orbit.
            </p>

            <div class="hero__release">
              <p class="hero__release-kicker" id="release-kicker"></p>
              <h2 id="release-title"></h2>
              <p class="hero__release-artist" id="release-artist"></p>
              <p class="hero__release-summary" id="release-summary"></p>
              <div class="hero__tags" id="release-tags"></div>
            </div>
          </div>

          <div class="coverflow" id="coverflow">
            <div class="coverflow__logo-ghost" aria-hidden="true">
              <img
                src="assets/brand/pawn-island-logo-1200.jpg"
                alt=""
              />
            </div>

            <button
              class="coverflow__slide coverflow__slide--prev"
              id="prev-stage"
              type="button"
              aria-label="Previous release"
            ></button>

            <article class="coverflow__slide coverflow__slide--active" id="active-stage"></article>

            <button
              class="coverflow__slide coverflow__slide--next"
              id="next-stage"
              type="button"
              aria-label="Next release"
            ></button>
          </div>
        </section>

        <footer class="reel" id="reel">
          <div class="reel__controls">
            <button class="reel__button" id="prev-release" type="button">Prev</button>
            <button class="reel__button reel__button--primary" id="next-release" type="button">
              Next
            </button>
          </div>

          <div class="reel__progress" aria-hidden="true">
            <span id="progress-bar"></span>
          </div>

          <div class="reel__viewport">
            <div class="reel__track" id="carousel-track"></div>
          </div>
        </footer>
      </main>
    </div>

    <script src="public-data.js"></script>
    <script src="site-store.js"></script>
    <script src="site-ui.js"></script>
    <script src="landing.js"></script>
  </body>
</html>
