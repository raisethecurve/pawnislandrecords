<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pawn Island Records</title>
    <meta
      name="description"
      content="Pawn Island Records: a modern discovery-led homepage for artists, releases, and Too.fm campaigns."
    />
    <script src="site-shell-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=League+Spartan:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="label-site.css" />
    <link rel="stylesheet" href="site-audio.css" />
  </head>
  <body data-page="home">
    <div class="label-page">
      <header class="label-header">
        <a class="brand-mark" href="index.html" aria-label="Pawn Island Records home">
          <img
            src="assets/brand/pawn-island-logo-1200.jpg"
            alt="Pawn Island Records logo"
          />
          <span class="brand-mark__copy">
            <strong>Pawn Island Records</strong>
            <span>Independent record label</span>
          </span>
        </a>

        <nav class="label-nav" aria-label="Primary">
          <a href="index.html" aria-current="page">Home</a>
          <a href="artists.html">Artists</a>
          <a href="about.html">About</a>
          <a href="epks.html">Press</a>
        </nav>
      </header>

      <main class="label-main">
        <section class="panel-shell panel-grid--home" aria-labelledby="home-title">
          <div class="home-hero">
            <article class="hero-copy">
              <p class="section-kicker">Independent Record Label</p>
              <h1 id="home-title">Pawn Island Records</h1>
              <p class="hero-copy__body" id="home-identity-line">
                A discovery-led independent label space built for artist identity, direct listening, and clean release worlds.
              </p>
              <div class="platform-banner" aria-labelledby="home-platforms-title">
                <p class="platform-banner__label" id="home-platforms-title">Find Us On</p>
                <div class="platform-banner__row" id="home-platforms"></div>
              </div>
              <div class="action-row action-row--center">
                <a
                  class="button button--primary"
                  id="home-playlist-link"
                  href="catalog.html"
                >
                  Pawn Island Playlist
                </a>
                <a
                  class="button button--toofm"
                  id="home-featured-release-link"
                  href="https://too.fm/yn8xx7l"
                  target="_blank"
                  rel="noreferrer"
                >
                  Featured Release
                </a>
              </div>
            </article>

            <aside class="feature-stack" id="home-feature-stack" aria-label="Featured discovery"></aside>
          </div>
        </section>
      </main>
    </div>

    <script src="public-data.js"></script>
    <script src="site-store.js"></script>
    <script src="site-ui.js"></script>
    <script src="label-site.js"></script>
    <script src="site-audio-config.js"></script>
    <script src="site-audio.js"></script>
  </body>
</html>
