<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" sizes="16x16" href="assets/brand/pawnisland-016.jpg" />
    <link rel="icon" type="image/jpeg" sizes="48x48" href="assets/brand/pawnisland-048.jpg" />
    <link rel="icon" type="image/jpeg" sizes="96x96" href="assets/brand/pawnisland-096.jpg" />
    <link rel="icon" type="image/jpeg" sizes="256x256" href="assets/brand/pawnisland-256.jpg" />
    <link rel="apple-touch-icon" sizes="512x512" href="assets/brand/pawnisland-512.jpg" />
    <title>Pawn Island Records</title>
    <meta
      name="description"
      content="Pawn Island Records: a one-person imprint for songs spread across distinct project worlds."
    />
    <script src="site-shell-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=League+Spartan:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="label-site.css" />
    <link rel="stylesheet" href="site-audio.css" />
  </head>
  <body data-page="home">
    <a class="skip-link" href="#label-main">Skip to content</a>
    <div class="label-page">
      <header class="label-header">
        <a class="brand-mark" href="index.html" aria-label="Pawn Island Records home">
          <img
            src="assets/brand/pawnisland-256.jpg"
            alt="Pawn Island Records logo"
            width="60"
            height="60"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
          <span class="brand-mark__copy">
            <strong>Pawn Island Records</strong>
            <span>One-Person Label Imprint</span>
          </span>
        </a>

        <nav class="label-nav" aria-label="Primary">
          <a href="index.html" aria-current="page">Home</a>
          <a href="roster.html">Roster</a>
          <a href="about.html">About</a>
        </nav>
      </header>

      <main class="label-main" id="label-main">
        <section class="panel-shell panel-grid--home" aria-labelledby="home-title">
          <div class="home-hero">
            <article class="hero-copy">
              <p class="section-kicker">One Writer, Many Worlds</p>
              <h1 id="home-title">Pawn Island</h1>
              <p class="hero-copy__body" id="home-identity-line">
                A one-person label imprint for songs that do not belong in one lane. Each project gives the writing its own weather, voice, and visual world.
              </p>
              <div class="platform-banner">
                <div class="platform-banner__row" id="home-platforms"></div>
              </div>
              <div class="hero-playlist-embed" aria-label="Pawn Island Playlist">
                <iframe
                  data-testid="embed-iframe"
                  title="Pawn Island Playlist on Spotify"
                  style="border-radius:12px"
                  src="https://open.spotify.com/embed/playlist/7ru1FJZS5qFXAbrNlh5YwZ?utm_source=generator&amp;theme=0"
                  width="85%"
                  height="352"
                  frameborder="0"
                  allowfullscreen=""
                  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                  loading="lazy"
                ></iframe>
              </div>
            </article>

            <aside class="feature-stack" id="home-feature-stack" aria-label="Featured discovery"></aside>
          </div>
        </section>
      </main>
    </div>

    <script src="public-data.js"></script>
    <script src="site-store.js"></script>
    <script src="site-ui.js"></script>
    <script src="label-site.js"></script>
    <script src="site-audio-config.js"></script>
    <script src="site-audio.js"></script>
  </body>
</html>
