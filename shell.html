<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" sizes="16x16" href="assets/brand/pawnisland-016.jpg" />
    <link rel="icon" type="image/jpeg" sizes="48x48" href="assets/brand/pawnisland-048.jpg" />
    <link rel="icon" type="image/jpeg" sizes="96x96" href="assets/brand/pawnisland-096.jpg" />
    <link rel="icon" type="image/jpeg" sizes="256x256" href="assets/brand/pawnisland-256.jpg" />
    <link rel="apple-touch-icon" sizes="512x512" href="assets/brand/pawnisland-512.jpg" />
    <title>Pawn Island Records</title>
    <meta
      name="description"
      content="Pawn Island Records immersive shell with persistent site-wide audio."
    />
    <link rel="canonical" href="https://pawnislandrecords.com/" />
    <meta name="robots" content="noindex,follow" />
    <meta property="og:site_name" content="Pawn Island Records" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pawn Island Records" />
    <meta property="og:description" content="A one-person independent label for songs spread across distinct project worlds." />
    <meta property="og:url" content="https://pawnislandrecords.com/" />
    <meta property="og:image" content="https://pawnislandrecords.com/assets/brand/pawnisland-1200.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="shell.css" />
    <link rel="stylesheet" href="site-audio.css" />
  </head>
  <body class="shell-body">
    <div class="shell-experience">
      <div class="shell-experience__wash" aria-hidden="true"></div>
      <div class="shell-experience__grid" aria-hidden="true"></div>
      <div class="shell-experience__noise" aria-hidden="true"></div>

      <header class="shell-header" id="shell-nav">
        <a class="shell-brand" href="index.html" data-shell-page="index.html" aria-label="Pawn Island Records home">
          <img
            src="assets/brand/pawnisland_youtube_watermark.png"
            alt="Pawn Island Records"
            width="48"
            height="48"
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
          <span class="shell-brand__name">Pawn Island Records</span>
        </a>
        <nav class="shell-nav" aria-label="Primary">
          <a href="index.html" data-shell-page="index.html">Home</a>
          <a href="roster.html" data-shell-page="roster.html">Roster</a>
          <a href="connect.html" data-shell-page="connect.html">Connect</a>
          <a href="about.html" data-shell-page="about.html">About</a>
        </nav>
      </header>

      <div class="shell-loading" id="shell-loading">
        <div class="shell-loading__brand" aria-label="Pawn Island Records">
          <img src="assets/brand/pawnisland-256.jpg" alt="" width="60" height="60" loading="eager" decoding="async" fetchpriority="high" />
          <span>PI</span>
        </div>
        <h1>Loading the next world.</h1>
      </div>

      <iframe
        id="site-shell-frame"
        class="shell-frame"
        title="Pawn Island Records"
        loading="eager"
        scrolling="no"
        allow="autoplay; fullscreen"
      ></iframe>
    </div>

    <script src="shell.js"></script>
    <script src="site-audio-config.js"></script>
    <script src="site-audio.js"></script>
  </body>
</html>
