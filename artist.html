<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" sizes="16x16" href="assets/brand/pawnisland-016.jpg" />
    <link rel="icon" type="image/jpeg" sizes="48x48" href="assets/brand/pawnisland-048.jpg" />
    <link rel="icon" type="image/jpeg" sizes="96x96" href="assets/brand/pawnisland-096.jpg" />
    <link rel="icon" type="image/jpeg" sizes="256x256" href="assets/brand/pawnisland-256.jpg" />
    <link rel="apple-touch-icon" sizes="512x512" href="assets/brand/pawnisland-512.jpg" />
    <title>Project | Pawn Island Records</title>
    <meta
      name="description"
      content="Explore an individual Pawn Island Records project page with discography and sample listening embeds."
    />
    <script src="site-shell-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=League+Spartan:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="label-site.css" />
    <link rel="stylesheet" href="site-audio.css" />
  </head>
  <body data-page="artist">
    <a class="skip-link" href="#label-main">Skip to content</a>
    <div class="label-page">

      <main class="label-main" id="label-main">
        <section class="panel-shell artist-page-shell" id="artist-page-panel" aria-labelledby="artist-page-title">
          <div class="artist-page-hero">
            <article class="artist-page-copy">
              <p class="section-kicker">Project Page</p>
              <h1 id="artist-page-title">Loading project...</h1>
              <p class="artist-page-copy__lane" id="artist-page-lane"></p>
              <p class="artist-page-copy__headline" id="artist-page-headline"></p>
              <p class="artist-page-copy__body" id="artist-page-body"></p>
              <div class="action-row" id="artist-page-actions"></div>
            </article>

            <aside class="artist-page-visual" id="artist-page-visual"></aside>
          </div>

          <div class="artist-page-content">
            <section class="artist-discography" aria-labelledby="artist-discography-title">
              <div class="rail-header">
                <div>
                  <p class="section-kicker">Discography</p>
                  <h2 id="artist-discography-title">Project Releases</h2>
                </div>
                <p class="rail-copy" id="artist-discography-copy">
                  Loading public discography.
                </p>
              </div>
              <div class="catalog-groups catalog-groups--artist" id="artist-discography"></div>
            </section>

            <section class="artist-embeds" aria-labelledby="artist-embed-title">
              <div class="rail-header">
                <div>
                  <p class="section-kicker">Gallery &amp; Media</p>
                  <h2 id="artist-embed-title">Covers, Spotify &amp; YouTube</h2>
                </div>
                <p class="rail-copy">
                  Switch between the cover gallery and available listening or video embeds for this project.
                </p>
              </div>
              <div id="artist-embeds"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script src="public-data.js"></script>
    <script src="site-ui.js"></script>
    <script src="label-site.js"></script>
    <script src="site-audio-config.js"></script>
    <script src="site-audio.js"></script>
  </body>
</html>
